<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Lead Form</title>
		<link rel="stylesheet" href="css.css">
		<script src="tracking.js"></script>
	</head>
	<body>
		<header class="site-header">
			<a href="index.html"><img src="./logo.png" alt="Logo" /></a>
		</header>

		<nav class="site-nav" aria-label="Primary Navigation">
			<a href="cta1.html">CTA1</a>
			<a href="cta2.html">CTA2</a>
			<a href="lead.html"><b>Lead Form</b></a>
			<a href="contact.html">Contact Form</a>
		</nav>

		<main>
			<h2>Lead Form</h2>
			<div style="border: 2px solid red">
				<!-- Capture Lead Form Example -->
				
				<form id="formcapture" action="">
					<label for="formfirstname">First Name:</label><br />
					<input type="text" id="formfirstname" name="formfirstname" required /><br /><br />
					
					<label for="formlastname">Last Name:</label><br />
					<input type="text" id="formlastname" name="formlastname" required /><br /><br />
					
					<label for="formemail">Email:</label><br />
					<input type="email" id="formemail" name="formemail" /><br /><br />

					<input type="checkbox" id="marketingCommunication" name="marketingCommunication" value="agree" />
					<label for="marketingCommunication">I agree to Marketing Communication</label><br /><br />

					<input type="submit" value="Submit" />
				</form>

				<script src='https://formui-usa1.mkt.dynamics.com/usa/FormCapture/FormCapture.bundle.js'></script>
				<script>
					// NOTE: for reference see https://go.microsoft.com/fwlink/?linkid=2250770

					d365mktformcapture.waitForElement("#formcapture") // example: "#form1" as a selector for form with id="form1"
					.then(form => {
						const mappings = [
							{
								FormFieldName: "formfirstname",
								DataverseFieldName: "firstname",
							},
							{
								FormFieldName: "formlastname",
								DataverseFieldName: "lastname",
							},
							{
								FormFieldName: "formemail",
								DataverseFieldName: "emailaddress1",
							},
							{
								FormFieldName: "marketingCommunication",
								DataverseFieldName: "msdynmkt_purposeid;channels;optinwhenchecked",
								DataverseFieldValue: "10000000-0000-0000-0000-000000000003;Email;true",
							},

						];

						form.addEventListener("submit", (e) => {
							e.preventDefault();
							const serializedForm = d365mktformcapture.serializeForm(form, mappings);
							// console.log(JSON.stringify(serializedForm)); // NOTE: enable for debugging
							const payload = serializedForm.SerializedForm.build();

							const captureConfig = {
								FormId: "7abb2c7a-1c4e-f111-bec5-0022480b97df",
								FormApiUrl: "https://public-usa.mkt.dynamics.com/api/v1.0/orgs/13f47eca-d036-f111-83fa-00224808ea33/landingpageforms"
							}
							d365mktformcapture.submitForm(captureConfig, payload);
						}, true);
					});
				</script>

		</main>

		<footer>
			<p>Customer Insights Demo</p>
		</footer>
	</body>
</html>
